<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Ton</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Загрузка ресурсов
        const coinImg = new Image(); coinImg.src = 'assets/coin.png';
        const backgroundImg = new Image(); backgroundImg.src = 'assets/bg.png';

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0;
        let state = 1; // 1 - игра, 2 - конец

        // Физика птички (сбалансированная и быстрая)
        const player = {
            x: 100,
            y: canvas.height / 2,
            radius: 35,
            velocity: 0,
            gravity: 0.23,
            jump: -5.3,

            reset() {
                this.y = canvas.height / 2;
                this.velocity = 0;
                score = 0; // СБРОС СЧЁТЧИКА
            },

            update() {
                if (state !== 1) return;

                this.velocity += this.gravity;
                this.y += this.velocity;

                // Столкновение с полом или потолком
                if (this.y + this.radius >= canvas.height || this.y - this.radius <= 0) {
                    state = 2;
                }
            },

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#0088cc"; // Временный синий круг вместо спрайта птицы
                ctx.fill();
                ctx.closePath();
            }
        };

        // Управление для ПК и Телефонов
        function handleInput() {
            if (state === 2) {
                player.reset();
                state = 1;
            } else if (state === 1) {
                player.velocity = player.jump;
            }
        }

        window.addEventListener('click', handleInput);
        window.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleInput();
        });

        // Главный игровой цикл
        function loop() {
            // Очистка холста и отрисовка фона
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (backgroundImg.complete) {
                ctx.drawImage(backgroundImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Обновление и отрисовка игрока
            player.update();
            player.draw();

            // Отрисовка интерфейса счета
            ctx.fillStyle = "white";
            ctx.font = "bold 40px Arial";
            ctx.fillText(score, 30, 60);

            if (state === 2) {
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "24px Arial";
                ctx.fillText("Ваш счёт: " + score, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText("Нажми, чтобы начать", canvas.width / 2, canvas.height / 2 + 70);
                ctx.textAlign = "left"; // сброс выравнивания
            }

            requestAnimationFrame(loop);
        }

        // ГАРАНТИРОВАННЫЙ ЗАПУСК ЦИКЛА
        loop();
    </script>
</body>
</html>
