<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Ton</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Загрузка ресурсов
        const coinImg = new Image(); coinImg.src = 'assets/coin.png';
        const backgroundImg = new Image(); backgroundImg.src = 'assets/bg.png';

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0;
        let state = 1; // 1 - игра, 2 - конец
        let pipes = [];
        let frameCount = 0;

        // НАСТРОЙКИ КОМФОРТНОЙ И ПРОСТОЙ ИГРЫ
        const PIPE_SPEED = 2.0;      
        const PIPE_SPAWN_RATE = 130; 
        const PIPE_GAP = 190;        

        const player = {
            x: 80,
            y: canvas.height / 2,
            radius: 23,              
            velocity: 0,
            gravity: 0.16,           
            jump: -4.2,              

            reset() {
                this.y = canvas.height / 2;
                this.velocity = 0;
                score = 0;
                pipes = [];
                frameCount = 0;
            },

            update() {
                if (state !== 1) return;

                this.velocity += this.gravity;
                this.y += this.velocity;

                if (this.y + this.radius >= canvas.height || this.y - this.radius <= 0) {
                    state = 2;
                }
            },

            draw() {
                if (coinImg.complete) {
                    ctx.drawImage(coinImg, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = "#0088cc";
                    ctx.fill();
                    ctx.closePath();
                }
            }
        };

        function updatePipes() {
            if (state !== 1) return;

            frameCount++;
            if (frameCount % PIPE_SPAWN_RATE === 0) {
                let minHeight = 50;
                let maxHeight = canvas.height - PIPE_GAP - 50;
                let topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;

                pipes.push({
                    x: canvas.width,
                    top: topHeight,
                    bottom: canvas.height - topHeight - PIPE_GAP,
                    width: 60,
                    passed: false
                });
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= PIPE_SPEED;

                if (
                    player.x + player.radius > pipes[i].x &&
                    player.x - player.radius < pipes[i].x + pipes[i].width
                ) {
                    if (player.y - player.radius < pipes[i].top || player.y + player.radius > canvas.height - pipes[i].bottom) {
                        state = 2; 
                    }
                }

                if (!pipes[i].passed && pipes[i].x + pipes[i].width < player.x) {
                    score++;
                    pipes[i].passed = true;
                }

                if (pipes[i].x + pipes[i].width < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function drawPipes() {
            ctx.fillStyle = "#0088cc"; 
            for (let i = 0; i < pipes.length; i++) {
                ctx.fillRect(pipes[i].x, 0, pipes[i].width, pipes[i].top);
                ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, pipes[i].width, pipes[i].bottom);
            }
        }

        function handleInput() {
            if (state === 2) {
                player.reset();
                state = 1;
            } else if (state === 1) {
                player.velocity = player.jump;
            }
        }

        window.addEventListener('click', handleInput);
        window.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleInput();
        });

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (backgroundImg.complete) {
                ctx.drawImage(backgroundImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            updatePipes();
            drawPipes();
            player.update();
            player.draw();

            ctx.fillStyle = "white";
            ctx.font = "bold 40px Arial";
            ctx.fillText(score, 30, 60);

            if (state === 2) {
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "24px Arial";
                ctx.fillText("Ваш счёт: " + score, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText("Нажми, чтобы начать", canvas.width / 2, canvas.height / 2 + 70);
                ctx.textAlign = "left";
            }

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
